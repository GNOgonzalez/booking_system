services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-booking_dev}
      POSTGRES_USER: ${DB_USER:-booking_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  pgdata:
