<!DOCTYPE html>
<html>
<head><title>Student Dashboard</title></head>
<body>
  <h1>Student Dashboard</h1>
  <p>Welcome, {{ user.username }}.</p>

  <form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit">Log out</button>
  </form>
  
  <form method="post" action="{% url 'student_book_session' 1 %}">
    {% csrf_token %}
    <button type="submit">Book session 1 (test)</button>
  </form>
  <p><a href="{% url 'student_session_list' %}">Browse open sessions</a></p>
  <p><a href="{% url 'student_dashboard' %}">Back to dashboard</a></p>
</body>
</html>
