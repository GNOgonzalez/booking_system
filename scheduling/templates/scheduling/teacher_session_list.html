<!DOCTYPE html>
<html>
<head><title>My sessions</title></head>
<body>
  <h1>My sessions</h1>

  {% for session in sessions %}
    <p>
      <strong>{{ session.title }}</strong>
      — {{ session.start_time }}
      - {{ session.status }}
      (seats: {{ session.capacity }})
    </p>
  {% empty %}
    <p>No sessions right now.</p>
  {% endfor %}

  <p><a href="{% url 'teacher_dashboard' %}">Back to dashboard</a></p>
</body>
</html>
